# =============================================================================
# OpenTelemetry Collector — cấu hình "trạm trung chuyển"
# App Go gửi trace + metric vào đây (OTLP), collector xử lý rồi export tiếp.
# =============================================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  # Trace → Jaeger UI: http://localhost:16686
  otlp/jaeger: # jaeger là bên bị động, otel-collector sẽ gửi data đến jaeger
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Trace + metric → OpenObserve UI: http://localhost:5080
  # Login: root@example.com / Complexpass#123
  otlphttp/openobserve: # openobserve là bên bị động, otel-collector sẽ gửi data đến openobserve
    endpoint: http://openobserve:5080/api/default
    headers:
      Authorization: "Basic cm9vdEBleGFtcGxlLmNvbTpDb21wbGV4cGFzcyMxMjM="
      stream-name: default
    tls:
      insecure: true

  # Metric → Prometheus scrape otel-collector:8889 → UI: http://localhost:9093
  prometheus: # prometheus là bên chủ động, otel-collector mở cổng cho prometheus vào lấy data
    endpoint: 0.0.0.0:8889

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, otlphttp/openobserve]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, otlphttp/openobserve]
